<svg width="640" height="640" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="hexClip">
      <polygon points="256,28 418,122 418,320 256,414 94,320 94,122"/>
    </clipPath>
  </defs>

  <!-- outer sticker border -->
  <polygon points="256,16 430,117 430,325 256,426 82,325 82,117" fill="#ffffff"/>

  <!-- main hex -->
  <polygon points="256,28 418,122 418,320 256,414 94,320 94,122"
           fill="#f8fafc"
           stroke="#0f172a"
           stroke-width="10"/>

  <g clip-path="url(#hexClip)">
    <!-- central bar monogram -->
    <!-- baseline = 304 -->
    <!-- bar width = 22 -->
    <!-- internal gap = 8 -->
    <!-- group gaps = 22, 22, 18 -->

    <!-- N : 3 2 1 3 -->
    <rect x="106" y="172" width="22" height="132" rx="8" fill="#1d4ed8"/>
    <rect x="136" y="212" width="22" height="92"  rx="8" fill="#1d4ed8"/>
    <rect x="166" y="252" width="22" height="52"  rx="8" fill="#1d4ed8"/>
    <rect x="196" y="172" width="22" height="132" rx="8" fill="#1d4ed8"/>

    <!-- u : 3 1 3 -->
    <rect x="240" y="172" width="22" height="132" rx="8" fill="#3b82f6"/>
    <rect x="270" y="252" width="22" height="52"  rx="8" fill="#3b82f6"/>
    <rect x="300" y="172" width="22" height="132" rx="8" fill="#3b82f6"/>

    <!-- l -->
    <rect x="344" y="172" width="22" height="132" rx="8" fill="#f59e0b"/>

    <!-- l -->
    <rect x="384" y="172" width="22" height="132" rx="8" fill="#fbbf24"/>

    <!-- subtle grounding line -->
    <line x1="116" y1="304" x2="396" y2="304"
          stroke="#cbd5e1"
          stroke-width="3"
          stroke-linecap="round"
          opacity="0.7"/>

    <!-- wordmark -->
    <text x="256" y="364"
          text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-size="30"
          font-weight="700"
          fill="#0f172a">Nullstrap</text>
  </g>
</svg>